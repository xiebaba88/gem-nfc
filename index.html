<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G.E.M. 應援卡</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: #f8f4ff;
      background:
        linear-gradient(rgba(30, 18, 58, 0.72), rgba(56, 30, 104, 0.82)),
        url("gem-bg.jpg") center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .top-badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(200, 162, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 800;
    }

    .subtitle {
      margin: 0 0 22px;
      color: #eadfff;
      font-size: 15px;
      line-height: 1.8;
    }

    .card-wrap {
      perspective: 1400px;
      width: 100%;
      max-width: 380px;
      margin: 0 auto 40px;
    }
    
    .card-float {
      width: 100%;
      animation: floating 3.6s ease-in-out infinite;
    }
    
    
    @keyframes floating {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .flip-card {
      width: 100%;
      aspect-ratio: 0.65 / 1;
      position: relative;
      cursor: pointer;
    }
    
    .flip-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
    }
    
    .flip-card.is-flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    
    .flip-card,
    .flip-card-inner,
    .card-face {
      z-index: 2;
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      overflow: hidden;
      backface-visibility: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .card-front {
      background: #2a1f4d;
    }

    .front-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .front-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(22, 10, 42, 0.85) 0%,
        rgba(22, 10, 42, 0.15) 45%,
        rgba(22, 10, 42, 0.05) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 20px 18px;
      text-align: left;
    }

    .front-name {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 4px;
    }

    .front-caption {
      margin: 0;
      font-size: 14px;
      color: #eee4ff;
    }

    .card-back {
      transform: rotateY(180deg);
      background:
        linear-gradient(165deg, rgba(93, 58, 170, 0.95), rgba(150, 110, 225, 0.88));
      backdrop-filter: blur(14px);
      padding: 22px 20px;
      text-align: left;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .member-badge {
      align-self: flex-start;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      margin-bottom: 14px;
    }

    .member-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
      z-index: 2;
    }

    .member-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
    }

    .member-tour {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      line-height: 1.6;
    }

    .member-heart {
      font-size: 28px;
    }

    .member-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
      z-index: 2;
    }

    .member-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .member-label {
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .member-value {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.6;
    }

    .member-message {
      margin-top: 2px;
      margin-bottom: 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff7ff;
      z-index: 2;
    }

    .member-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.18);
      font-size: 14px;
      color: #f5edff;
      line-height: 1.8;
      white-space: pre-line;
      z-index: 2;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ead8ff 0%, #c8a2ff 100%);
      color: #2b0d52;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
    }

    .bottom-note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.8;
    }

    @media (max-width: 560px) {
      .title {
        font-size: 28px;
      }

      .subtitle {
        font-size: 14px;
      }

      .card-wrap {
        max-width: 340px;
      }

      .member-title {
        font-size: 22px;
      }

      .member-tour,
      .member-label,
      .member-value,
      .member-footer,
      .member-message {
        font-size: 14px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-badge">G.E.M. 應援卡收藏系統</div>
    <h1 class="title">專屬應援卡</h1>
    <p class="subtitle">
      點一下卡片可以翻面。<br>
      每一張卡，都是不同的相遇。
    </p>

    <div class="card-wrap">
      <div class="card-float">
        <div class="flip-card" id="flipCard">
          <div class="flip-card-inner">
            <div class="card-face card-front">
              <img id="frontImage" class="front-image" src="1.jpg" alt="G.E.M. 應援卡圖片" />
              <div class="front-overlay">
                <h2 class="front-name">G.E.M.</h2>
              </div>
            </div>
    
            <div class="card-face card-back">
              <div class="member-badge">MEMBER CARD</div>
    
              <div class="member-head">
                <div>
                  <h2 class="member-title">G.E.M.</h2>
                  <div class="member-tour">I AM GLORIA 2.0 台北站</div>
                </div>
                <div class="member-heart">💜</div>
              </div>
    
              <div class="member-grid">
                <div class="member-item">
                  <div class="member-label">身份</div>
                  <div class="member-value">鄧紫棋忠實粉絲</div>
                </div>
    
                <div class="member-item">
                  <div class="member-label">日期</div>
                  <div class="member-value">2026/4/9～2026/4/12 🎤</div>
                </div>
    
                <div class="member-item">
                  <div class="member-label">卡號</div>
                  <div class="member-value" id="memberCardNo">No.527_001 ✨</div>
                </div>
              </div>
    
              <div class="member-message">
                這是屬於你的應援卡～ 💜
              </div>
    
              <div class="member-footer">💜 G.E.M. 💜
    
        此刻的我們，是最幸福的棋士 💎
    
        「見過光，就要把光反射出去」 🌟</div>
    
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" id="makerBtn" href="maker.html">自製粉絲卡</a>
      <a class="btn btn-secondary" id="gameBtn" href="game.html">進入小遊戲</a>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawId = parseInt(params.get("id"), 10);
    const cardId = (!isNaN(rawId) && rawId >= 1 && rawId <= 30) ? rawId : 1;

    const cardNo = `No.527_${String(cardId).padStart(3, "0")}`;
    const imageFile = `${cardId}.jpg`;

    const img = document.getElementById("frontImage");
    img.src = imageFile;
    img.onerror = () => {
      img.src = "1.jpg";
    };

    document.getElementById("memberCardNo").textContent = `${cardNo} ✨`;

    const flipCard = document.getElementById("flipCard");
    flipCard.addEventListener("click", () => {
      flipCard.classList.toggle("is-flipped");
    });

    document.getElementById("makerBtn").href = `maker.html?id=${cardId}`;
    document.getElementById("gameBtn").href = `game.html?id=${cardId}`;
  </script>
</body>
</html>
