<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小遊戲系統</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        linear-gradient(rgba(35, 22, 67, 0.82), rgba(78, 49, 144, 0.90)),
        url("gem-bg3.jpg") center center / cover no-repeat fixed;
      color: #f7f2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin: 0 0 8px;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.8;
      color: #ebdfff;
      margin: 0 0 10px;
    }

    .flower-area {
      width: 230px;
      height: 230px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(233,216,255,0.45), rgba(123,95,201,0.12));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.05);
      overflow: hidden;
      position: relative;
    }

    .flower-img {
      width: 82%;
      max-height: 82%;
      object-fit: contain;
      transform: scale(0.2);
      opacity: 0;
      transition: transform 1.2s ease, opacity 1.2s ease, filter 1.2s ease;
    }

    .flower-img.seed-ready {
      transform: scale(0.88);
      opacity: 1;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
    }

    .flower-img.bloom {
      transform: scale(1);
      opacity: 1;
      filter: drop-shadow(0 0 25px rgba(255,255,255,0.55));
    }

    .flower-img.glow {
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%   { filter: drop-shadow(0 0 10px rgba(255,255,255,0.28)); }
      50%  { filter: drop-shadow(0 0 34px rgba(255,255,255,0.82)); }
      100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.28)); }
    }

    .hint {
      font-size: 13px;
      color: #ddd0ff;
      margin-bottom: 16px;
      line-height: 1.8;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    input::placeholder {
      color: rgba(255,255,255,0.66);
    }

    button {
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #2b0d52;
      background: linear-gradient(135deg, #ead8ff 0%, #c8a2ff 100%);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .status {
      min-height: 24px;
      margin-top: 10px;
      font-size: 14px;
      color: #ffdff4;
      white-space: pre-line;
      line-height: 1.8;
    }

    .result {
      margin-top: 18px;
      padding: 18px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: left;
      display: none;
    }

    .result.show {
      display: block;
      animation: fadeIn 0.45s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-title {
      font-size: 18px;
      margin: 0 0 10px;
      color: #fff;
    }

    .result-text {
      margin: 0;
      line-height: 1.95;
      color: #f4eeff;
      font-size: 15px;
      white-space: pre-line;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .actions button,
    .actions a {
      flex: 1;
      min-width: 120px;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      line-height: 1.8;
    }

    @media (max-width: 540px) {
      .input-group {
        flex-direction: column;
      }

      .actions {
        flex-direction: column;
      }

      .actions button,
      .actions a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>《小遊戲系統》</h1>
    <p class="subtitle">
      歡迎來到小遊戲區。<br>
      這個遊戲靈感來自鄧紫棋小說《啓示路》。<br>
      請輸入密碼，喚醒屬於你的花。
    </p>

    <div class="flower-area">
      <img id="flower" src="seed.png" alt="種子" class="flower-img seed-ready">
    </div>

    <div class="hint" id="hintText">
      提示：密碼不限中英文或數字，可能和鄧紫棋、《啓示路》或某個特別日子有關。
    </div>

    <div class="actions">
      <button onclick="nextHint()">🎯 提示</button>
      <button onclick="nextAnswer()">👀 偷看答案</button>
    </div>

    <div class="input-group">
      <input
        type="text"
        id="passwordInput"
        placeholder="請輸入啟動密碼"
        autocomplete="off"
      />
      <button onclick="unlockFlower()">輸入</button>
    </div>

    <div class="status" id="statusText"></div>

    <div class="result" id="resultBox">
      <h2 class="result-title" id="resultTitle">已解鎖</h2>
      <p class="result-text" id="resultText"></p>

      <div class="actions">
        <button class="secondary-btn" onclick="resetSystem()">重新輸入</button>
      </div>
    </div>

    <div class="actions" style="margin-top: 20px;">
      <a class="secondary-btn" id="homeBtn" href="index.html">返回應援卡</a>
      <a class="secondary-btn" id="makerBtn" href="maker.html">自製粉絲卡</a>
    </div>

    <div class="footer-note">
      天空沒有極限，<br>
      我的未來無邊。
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawId = parseInt(params.get("id"), 10);
    const cardId = (!isNaN(rawId) && rawId >= 1 && rawId <= 30) ? rawId : 1;

    document.getElementById("homeBtn").href = `index.html?id=${cardId}`;
    document.getElementById("makerBtn").href = `maker.html?id=${cardId}`;

    const passwordData = {
      "G.E.M.": {
        image: "sunflower.png",
        title: "向日葵已綻放",
        text: "你喚醒了向日葵。\n它總是朝向光的方向。\n訊息：她就是我們的光。"
      },
      "GEM": {
        image: "sunflower.png",
        title: "向日葵已綻放",
        text: "你喚醒了向日葵。\n它總是朝向光的方向。\n訊息：她就是我們的光。"
      },
      "GLORIA": {
        image: "butterfly.png",
        title: "蝴蝶花已綻放",
        text: "你喚醒了蝴蝶花。\n象徵重生與信念。\n蝴蝶也將會破繭。"
      },
      "棋士": {
        image: "babysbreath.png",
        title: "滿天星已綻放",
        text: "你喚醒了滿天星。\n只為了 夜空中最亮的那顆星。\n我們也許不認識，但我們喜歡同一個人。"
      },
      "0527": {
        image: "swirl.png",
        title: "銀色漩渦已綻放",
        text: "你喚醒了銀色漩渦。\n如果完美只存在於虛擬世界，\n你會愛真實的我嗎？"
      },
      "0923": {
        image: "snow.png",
        title: "雪片蓮已綻放",
        text: "你喚醒了雪片蓮。\n這株曾被封存的生命，\n終於在此刻綻放。"
      },
      "0816": {
        image: "mint.png",
        title: "薄荷已綻放",
        text: "你喚醒了薄荷。\n象徵清新與初心。\n不管多久，都不要忘記最初的喜歡。"
      },
      "0302": {
        image: "chrysanthemum.png",
        title: "秋菊已綻放",
        text: "你喚醒了秋菊。\n它盛開於時間之中。\n見過光，就要把光反射出去。"
      }
    };

    const hints = [
      "提示1：有一組密碼和名字有關。",
      "提示2：有一組密碼和巡演主題有關。",
      "提示3：有一組密碼是日期，來自小說 與『家的密碼...』有關",
      "提示4：有一組密碼是日期，來自小說 與『如果神讓你看見』有關",
      "提示5：有一組密碼是日期，來自小說 與『讓世界暫停一分鐘』有關",
      "提示6：有一組密碼與特殊日期有關。",
      "提示7：有一組密碼是粉絲身份感。"
    ];

    const answers = [
      "G.E.M.",
      "GLORIA",
      "0302",
      "0527",
      "0923",
      "0816",
      "棋士"
    ];

    let hintIndex = 0;
    let answerIndex = 0;

    function nextHint() {
      const statusText = document.getElementById("statusText");
      statusText.textContent = hints[hintIndex];
      hintIndex++;
      if (hintIndex >= hints.length) hintIndex = 0;
    }

    function nextAnswer() {
      const statusText = document.getElementById("statusText");
      statusText.textContent = `答案提示：${answers[answerIndex]}`;
      answerIndex++;
      if (answerIndex >= answers.length) answerIndex = 0;
    }

    function unlockFlower() {
      const input = document.getElementById("passwordInput").value.trim();
      const normalized = input.toUpperCase();

      const resultBox = document.getElementById("resultBox");
      const resultTitle = document.getElementById("resultTitle");
      const resultText = document.getElementById("resultText");
      const statusText = document.getElementById("statusText");
      const flower = document.getElementById("flower");

      let data = null;

      if (passwordData[input]) {
        data = passwordData[input];
      } else if (passwordData[normalized]) {
        data = passwordData[normalized];
      }

      flower.classList.remove("bloom", "glow", "seed-ready");

      if (data) {
        statusText.textContent = "驗證成功，正在開花……";
        resultTitle.textContent = data.title;
        resultText.textContent = data.text;
        resultBox.classList.add("show");

        flower.src = "seed.png";
        flower.alt = "種子";

        setTimeout(() => {
          flower.src = data.image;
          flower.alt = data.title;
          flower.classList.add("bloom");

          setTimeout(() => {
            flower.classList.add("glow");
          }, 800);
        }, 220);
      } else {
        resultBox.classList.remove("show");
        statusText.textContent = "密碼錯誤，尚未偵測到有效訊號。";
        flower.src = "seed.png";
        flower.alt = "種子";
        flower.classList.add("seed-ready");
      }
    }

    function resetSystem() {
      document.getElementById("passwordInput").value = "";
      document.getElementById("statusText").textContent = "";
      document.getElementById("resultBox").classList.remove("show");
      document.getElementById("hintText").textContent = "提示：密碼不限中英文或數字，可能和鄧紫棋、《啓示路》或某個特別日子有關。";

      const flower = document.getElementById("flower");
      flower.src = "seed.png";
      flower.alt = "種子";
      flower.classList.remove("bloom", "glow");
      flower.classList.add("seed-ready");
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        unlockFlower();
      }
    });
  </script>
</body>
</html>
