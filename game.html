<script>
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get("id");
  const isSpecialGem = idParam === "gem";

  const rawId = parseInt(idParam, 10);
  const cardId = (!isNaN(rawId) && rawId >= 1 && rawId <= 30) ? rawId : 1;

  // 🔥 修正：保留 gem
  document.getElementById("homeBtn").href = `index.html?id=${isSpecialGem ? "gem" : cardId}`;
  document.getElementById("makerBtn").href = `maker.html?id=${isSpecialGem ? "gem" : cardId}`;

  const passwordData = {
    "G.E.M.": {
      image: "sunflower.png",
      title: "向日葵已綻放",
      text: "你喚醒了向日葵。\n它總是朝向光的方向。\n訊息：她就是我們的光。"
    },
    "GEM": {
      image: "sunflower.png",
      title: "向日葵已綻放",
      text: "你喚醒了向日葵。\n它總是朝向光的方向。\n訊息：她就是我們的光。"
    },
    "GLORIA": {
      image: "butterfly.png",
      title: "蝴蝶花已綻放",
      text: "你喚醒了蝴蝶花。\n象徵重生與信念。\n蝴蝶也將會破繭。"
    },
    "棋士": {
      image: "babysbreath.png",
      title: "滿天星已綻放",
      text: "你喚醒了滿天星。\n只為了 夜空中最亮的那顆星。\n我們也許不認識，但我們喜歡同一個人。"
    },
    "0527": {
      image: "swirl.png",
      title: "銀色漩渦已綻放",
      text: "你喚醒了銀色漩渦。\n如果完美只存在於虛擬世界，\n你會愛真實的我嗎？"
    },
    "0923": {
      image: "snow.png",
      title: "雪片蓮已綻放",
      text: "你喚醒了雪片蓮。\n這株曾被封存的生命，\n終於在此刻綻放。"
    },
    "0816": {
      image: "mint.png",
      title: "薄荷已綻放",
      text: "你喚醒了薄荷。\n象徵清新與初心。\n不管多久，都不要忘記最初的喜歡。"
    },
    "0302": {
      image: "chrysanthemum.png",
      title: "秋菊已綻放",
      text: "你喚醒了秋菊。\n它盛開於時間之中。\n見過光，就要把光反射出去。"
    }
  };

  const hints = [
    "提示1：有一組密碼和名字有關。",
    "提示2：有一組密碼和巡演主題有關。",
    "提示3：有一組密碼是日期，來自小說 與『家的密碼...』有關",
    "提示4：有一組密碼是日期，來自小說 與『如果神讓你看見』有關",
    "提示5：有一組密碼是日期，來自小說 與『讓世界暫停一分鐘』有關",
    "提示6：有一組密碼與特殊日期有關。",
    "提示7：有一組密碼是粉絲身份感。"
  ];

  const answers = [
    "G.E.M.",
    "GLORIA",
    "0302",
    "0527",
    "0923",
    "0816",
    "棋士"
  ];

  let hintIndex = 0;
  let answerIndex = 0;

  function nextHint() {
    const statusText = document.getElementById("statusText");
    statusText.textContent = hints[hintIndex];
    hintIndex = (hintIndex + 1) % hints.length;
  }

  function nextAnswer() {
    const statusText = document.getElementById("statusText");
    statusText.textContent = `答案提示：${answers[answerIndex]}`;
    answerIndex = (answerIndex + 1) % answers.length;
  }

  function unlockFlower() {
    const input = document.getElementById("passwordInput").value.trim();
    const normalized = input.toUpperCase();

    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");
    const statusText = document.getElementById("statusText");
    const flower = document.getElementById("flower");

    let data = passwordData[input] || passwordData[normalized];

    flower.classList.remove("bloom", "glow", "seed-ready");

    if (data) {
      statusText.textContent = "驗證成功，正在開花……";
      resultTitle.textContent = data.title;
      resultText.textContent = data.text;
      resultBox.classList.add("show");

      flower.src = "seed.png";

      setTimeout(() => {
        flower.src = data.image;
        flower.classList.add("bloom");

        setTimeout(() => {
          flower.classList.add("glow");
        }, 800);
      }, 220);
    } else {
      resultBox.classList.remove("show");
      statusText.textContent = "密碼錯誤，尚未偵測到有效訊號。";
      flower.src = "seed.png";
      flower.classList.add("seed-ready");
    }
  }

  function resetSystem() {
    document.getElementById("passwordInput").value = "";
    document.getElementById("statusText").textContent = "";
    document.getElementById("resultBox").classList.remove("show");

    const flower = document.getElementById("flower");
    flower.src = "seed.png";
    flower.classList.remove("bloom", "glow");
    flower.classList.add("seed-ready");
  }

  document.getElementById("passwordInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      unlockFlower();
    }
  });
</script>
